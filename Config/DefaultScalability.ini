; ── TPS SURVIVAL — SCALABILITY PROFILES ─────────────────────────────────────
;
; Three tiers:
;   sg.OverallQuality=0  →  Mobile  (Adreno 610, 30fps target)
;   sg.OverallQuality=2  →  Switch 2 (60fps target, docked)
;   sg.OverallQuality=3  →  PC / Steam (60-120fps, no budget limit)
;
; Applied at runtime in TPSGameInstance::DetectAndApplyScalability()
; ─────────────────────────────────────────────────────────────────────────────

[ResolutionQuality@0]
r.ScreenPercentage=75

[ResolutionQuality@2]
r.ScreenPercentage=87

[ResolutionQuality@3]
r.ScreenPercentage=100

; ── VIEW DISTANCE ─────────────────────────────────────────────────────────────
[ViewDistanceQuality@0]
r.SkeletalMeshLODBias=1
r.ViewDistanceScale=0.6

[ViewDistanceQuality@2]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=0.85

[ViewDistanceQuality@3]
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=1.0

; ── SHADOWS ──────────────────────────────────────────────────────────────────
; Mobile: baked only, no dynamic shadows (blob shadow only)
; Switch 2: simple shadow maps on character and key props
; PC: full shadow cascade

[ShadowQuality@0]
r.ShadowQuality=0
r.Shadow.CSM.MaxCascades=0
r.DynamicGlobalIlluminationMethod=0

[ShadowQuality@2]
r.ShadowQuality=2
r.Shadow.CSM.MaxCascades=1
r.Shadow.MaxResolution=512

[ShadowQuality@3]
r.ShadowQuality=4
r.Shadow.CSM.MaxCascades=2
r.Shadow.MaxResolution=1024

; ── ANTI-ALIASING ─────────────────────────────────────────────────────────────
; Mobile: FXAA
; Switch 2 + PC: TAA

[AntiAliasingQuality@0]
r.AntiAliasingMethod=1
r.PostProcessAAQuality=2

[AntiAliasingQuality@2]
r.AntiAliasingMethod=2
r.PostProcessAAQuality=4
r.TemporalAA.Upsampling=1

[AntiAliasingQuality@3]
r.AntiAliasingMethod=2
r.PostProcessAAQuality=6
r.TemporalAA.Upsampling=1

; ── POST PROCESS ─────────────────────────────────────────────────────────────
; Mobile: outline + LUT only
; Switch 2: + subtle depth of field in aim mode
; PC: + light SSAO

[PostProcessQuality@0]
r.BloomQuality=0
r.DepthOfFieldQuality=0
r.AmbientOcclusion.Enabled=0
r.EyeAdaptationQuality=0

[PostProcessQuality@2]
r.BloomQuality=0
r.DepthOfFieldQuality=1
r.AmbientOcclusion.Enabled=0
r.EyeAdaptationQuality=0

[PostProcessQuality@3]
r.BloomQuality=0
r.DepthOfFieldQuality=2
r.AmbientOcclusion.Enabled=1
r.AmbientOcclusionLevels=1
r.EyeAdaptationQuality=0

; ── TEXTURE ──────────────────────────────────────────────────────────────────
[TextureQuality@0]
r.Streaming.MipBias=1
r.MaxAnisotropy=4

[TextureQuality@2]
r.Streaming.MipBias=0
r.MaxAnisotropy=8

[TextureQuality@3]
r.Streaming.MipBias=0
r.MaxAnisotropy=16

; ── EFFECTS / VFX ────────────────────────────────────────────────────────────
[EffectsQuality@0]
r.ParticleLODBias=2
fx.Niagara.MaxGPUParticlesSpawnPerFrame=20

[EffectsQuality@2]
r.ParticleLODBias=1
fx.Niagara.MaxGPUParticlesSpawnPerFrame=100

[EffectsQuality@3]
r.ParticleLODBias=0
fx.Niagara.MaxGPUParticlesSpawnPerFrame=500

; ── FOLIAGE (unused but defined to prevent warnings) ─────────────────────────
[FoliageQuality@0]
grass.DensityScale=0

[FoliageQuality@2]
grass.DensityScale=0

[FoliageQuality@3]
grass.DensityScale=0